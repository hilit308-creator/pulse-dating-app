# Pulse_Chat_Gates_API_Contract.yaml (V1)
# Chat Gates & Messaging - Server Source of Truth

openapi: 3.0.3
info:
  title: Pulse Chat API - Gates & Messaging
  version: 1.0.0
  description: |
    Chat API with feature gates for messaging control.
    
    🔒 LOCKED RULES:
    - Server is the ONLY source of truth for gates
    - Client NEVER decides if messaging is allowed
    - Idempotency required for all send operations
    - Real-time updates via polling or websocket

servers:
  - url: https://api.pulse.app

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    GateCTAType:
      type: string
      enum: [none, buy_subscription, use_points, complete_action]
      description: |
        - none: No CTA available
        - buy_subscription: Navigate to subscription screen
        - use_points: Navigate to points screen
        - complete_action: Custom action required

    BlockReason:
      type: string
      enum:
        - NONE
        - NEED_MATCH
        - SUBSCRIPTION_REQUIRED
        - POINTS_FEATURE_REQUIRED
        - GATED_BY_RULE
        - SYSTEM_BLOCKED
        - EXPIRED
      description: |
        - NONE: No blocking, messaging allowed
        - NEED_MATCH: Users haven't matched yet
        - SUBSCRIPTION_REQUIRED: Premium required
        - POINTS_FEATURE_REQUIRED: Points unlock required
        - GATED_BY_RULE: Custom business rule
        - SYSTEM_BLOCKED: Safety/moderation block (NO CTA!)
        - EXPIRED: Chat window expired

    GateState:
      type: object
      required: [canSendMessage, blockReason, cta]
      properties:
        canSendMessage:
          type: boolean
          description: True if user can send messages right now
        blockReason:
          $ref: '#/components/schemas/BlockReason'
        cta:
          type: object
          required: [type, label]
          properties:
            type:
              $ref: '#/components/schemas/GateCTAType'
            label:
              type: string
              description: Button text for CTA
            payload:
              type: object
              additionalProperties: true
              description: Additional data for CTA action

    ThreadState:
      type: string
      enum: [MATCHED_UNLOCKED, MATCHED_GATED, BLOCKED, EXPIRED]
      description: |
        - MATCHED_UNLOCKED: Messages allowed
        - MATCHED_GATED: Matched but blocked by gate
        - BLOCKED: Safety/report block
        - EXPIRED: Chat window expired

    ChatThread:
      type: object
      required: [threadId, participants, state, gates, createdAt]
      properties:
        threadId:
          type: string
          example: "t_abc123"
        participants:
          type: array
          items:
            type: string
          example: ["u_user1", "u_user2"]
        state:
          $ref: '#/components/schemas/ThreadState'
        gates:
          $ref: '#/components/schemas/GateState'
        createdAt:
          type: string
          format: date-time
        lastMessageAt:
          type: string
          format: date-time
          nullable: true

    Message:
      type: object
      required: [messageId, threadId, senderId, type, body, createdAt]
      properties:
        messageId:
          type: string
          example: "m_xyz789"
        threadId:
          type: string
        senderId:
          type: string
        type:
          type: string
          enum: [text]
        body:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time

    MessagesPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        nextCursor:
          type: string
          nullable: true
          description: Cursor for next page, null if no more

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

paths:
  /v1/chat/threads/{threadId}:
    get:
      summary: Get thread metadata + current gates
      operationId: getThread
      tags:
        - Chat
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thread details including gates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThread'
              examples:
                unlocked:
                  summary: Unlocked thread
                  value:
                    threadId: "t_123"
                    participants: ["u_a", "u_b"]
                    state: MATCHED_UNLOCKED
                    gates:
                      canSendMessage: true
                      blockReason: NONE
                      cta:
                        type: none
                        label: ""
                    createdAt: "2026-01-01T10:00:00Z"
                    lastMessageAt: "2026-01-01T12:30:00Z"
                gated:
                  summary: Gated thread
                  value:
                    threadId: "t_123"
                    participants: ["u_a", "u_b"]
                    state: MATCHED_GATED
                    gates:
                      canSendMessage: false
                      blockReason: SUBSCRIPTION_REQUIRED
                      cta:
                        type: buy_subscription
                        label: "View Premium"
                    createdAt: "2026-01-01T10:00:00Z"
                    lastMessageAt: null
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/chat/threads/{threadId}/messages:
    get:
      summary: Get messages page
      operationId: getMessages
      tags:
        - Chat
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Pagination cursor
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 30
      responses:
        '200':
          description: Messages page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesPage'
        '403':
          description: Thread blocked or system restricted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                blocked:
                  value:
                    code: THREAD_BLOCKED
                    message: "This conversation is not available."

    post:
      summary: Send a message (server-enforced gates)
      operationId: sendMessage
      tags:
        - Chat
      description: |
        Must be idempotent via Idempotency-Key header.
        Server is source of truth. If gated, reject with reason and updated gates.
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            format: uuid
          description: Unique key to prevent duplicate sends
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, body]
              properties:
                type:
                  type: string
                  enum: [text]
                body:
                  type: string
                  maxLength: 2000
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                type: object
                required: [message, thread]
                properties:
                  message:
                    $ref: '#/components/schemas/Message'
                  thread:
                    $ref: '#/components/schemas/ChatThread'
        '409':
          description: Gated - cannot send
          content:
            application/json:
              schema:
                type: object
                required: [code, message, gates, thread]
                properties:
                  code:
                    type: string
                    enum: [MESSAGE_GATED]
                  message:
                    type: string
                  gates:
                    $ref: '#/components/schemas/GateState'
                  thread:
                    $ref: '#/components/schemas/ChatThread'
              examples:
                subscription_required:
                  value:
                    code: MESSAGE_GATED
                    message: "Messaging is locked."
                    gates:
                      canSendMessage: false
                      blockReason: SUBSCRIPTION_REQUIRED
                      cta:
                        type: buy_subscription
                        label: "View Premium"
                    thread:
                      threadId: "t_123"
                      participants: ["u_a", "u_b"]
                      state: MATCHED_GATED
                      gates:
                        canSendMessage: false
                        blockReason: SUBSCRIPTION_REQUIRED
                        cta:
                          type: buy_subscription
                          label: "View Premium"
                      createdAt: "2026-01-01T10:00:00Z"
                      lastMessageAt: null
        '403':
          description: Blocked / system blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                system_blocked:
                  value:
                    code: SYSTEM_BLOCKED
                    message: "This conversation is blocked."
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/chat/threads/{threadId}/gates:
    get:
      summary: Get gates only (lightweight polling)
      operationId: getGates
      tags:
        - Chat
      description: Lightweight endpoint for polling gate status
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current gates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateState'

# 🔒 Idempotency (Locked)
# Header חובה לשליחה:
# Idempotency-Key: <uuid>
#
# אם אותה בקשה נשלחת פעמיים עם אותו key:
# השרת מחזיר את אותה תגובה (201 עם אותו messageId)
